name: fitmama
description: "FitMama — kadına özel postpartum fitness & wellness companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  shared_preferences: ^2.3.3
  intl: any
  fl_chart: ^0.69.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  home_widget: ^0.9.1
  youtube_player_flutter: ^9.1.3
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.0.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/branding/fitmama_logo_square.png
    - assets/branding/fitmama_logo.png
    - assets/branding/fitmama_icon_legacy.png
    - assets/branding/fitmama_icon_foreground.png
    - assets/branding/fitmama_icon_splash.png
    - assets/images/meals/
    - assets/images/workouts/
    - assets/images/programs/
    - assets/images/discover/
    - assets/images/transformations/
  # SF Pro font registration — Apple lisanslı, ücretsiz indirip
  # assets/fonts/ altına koy. Dosyaları yerleştirdikten sonra aşağıdaki
  # `fonts:` bloğunu uncomment et. Detay: assets/fonts/README.md.
  # fonts:
  #   - family: SF Pro Display
  #     fonts:
  #       - asset: assets/fonts/SF-Pro-Display-Regular.otf
  #         weight: 400
  #       - asset: assets/fonts/SF-Pro-Display-Medium.otf
  #         weight: 500
  #       - asset: assets/fonts/SF-Pro-Display-Semibold.otf
  #         weight: 600
  #       - asset: assets/fonts/SF-Pro-Display-Bold.otf
  #         weight: 700
  #       - asset: assets/fonts/SF-Pro-Display-Heavy.otf
  #         weight: 800
  #       - asset: assets/fonts/SF-Pro-Display-Black.otf
  #         weight: 900
  #   - family: SF Pro Text
  #     fonts:
  #       - asset: assets/fonts/SF-Pro-Text-Regular.otf
  #         weight: 400
  #       - asset: assets/fonts/SF-Pro-Text-Medium.otf
  #         weight: 500
  #       - asset: assets/fonts/SF-Pro-Text-Semibold.otf
