name: momrise
description: "Postpartum support companion for new mothers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  shared_preferences: ^2.3.3
  intl: any
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  home_widget: ^0.9.1
  youtube_player_flutter: ^9.1.3
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/branding/momrise_logo_square.png
